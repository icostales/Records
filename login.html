<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NTA Project Records</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="login-container">

<h1>NTA Project Records</h1>

<form id="loginForm">

<label class="field-label" for="email">
Email
</label>

<input
type="email"
id="email"
placeholder="Email"
required>

<label class="field-label" for="password">
Password
</label>

<div class="password-field">

<input
type="password"
id="password"
placeholder="Password"
required>

<button
type="button"
id="togglePassword"
class="toggle-password"
aria-label="Show password"
>
</button>

</div>

<div
id="loginMessage"
class="login-message"
aria-live="polite"
></div>

<button type="submit">
Login
</button>

<button
type="button"
id="forgotPassword"
class="text-link"
>
Forgot password?
</button>

</form>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
